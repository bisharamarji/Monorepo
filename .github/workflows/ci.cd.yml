name: Monorepo CI/CD Automation

on:
  pull_request:
    branches:
      - main
    paths:
      # Corrected path
      - 'src/**'
      - '.github/workflows/ci.cd.yml'
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  test_matrix:
    name: Node.js Test Matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          # Corrected path
          cache-dependency-path: 'package-lock.json'

      - name: Install Dependencies
        # Corrected path
        working-directory: src/backend
        run: npm ci

      - name: Run Backend Tests
        # Corrected path
        working-directory: src/backend
        run: npm test

  sonarqube_analysis:
    name: SonarQube Code Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          # Corrected path (points to the root of the repo)
          projectBaseDir: .

  simulate_deployment:
    name: Simulate Production Deployment
    runs-on: ubuntu-latest
    needs: [test_matrix, sonarqube_analysis]
    steps:
      - name: Deploy Simulation
        run: |
          echo "✅ Tests passed across all Node versions."
          echo "✅ SonarQube analysis completed securely."
          echo "🚀 Simulating secure deployment to the staging environment..."
          sleep 2
          echo "🎉 Deployment Successful!"

  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: simulate_deployment
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Publish Automated Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
